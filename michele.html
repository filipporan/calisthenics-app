<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calisthenics — Michele</title>
<style>
:root {
  --bg: #0f0f0f;
  --card: #1a1a2e;
  --accent: #ff7043;
  --accent2: #bf360c;
  --text: #eee;
  --muted: #888;
  --green: #4ecca3;
  --yellow: #f0c040;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
header {
  background: linear-gradient(135deg, var(--accent2), #4e342e);
  padding: 20px 16px 12px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
}
header h1 { font-size: 1.3em; margin-bottom: 4px; }
header .subtitle { color: rgba(255,255,255,0.6); font-size: 0.85em; }
.header-buttons {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-top: 10px;
}
.phase-bar {
  display: flex;
  gap: 6px;
  justify-content: center;
}
.phase-bar button, .crono-btn {
  padding: 6px 12px;
  border: none;
  border-radius: 16px;
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.6);
  font-size: 0.8em;
  cursor: pointer;
}
.phase-bar button.active {
  background: var(--accent);
  color: white;
  font-weight: 600;
}
.crono-btn {
  background: rgba(78,204,163,0.2);
  color: var(--green);
  font-weight: 600;
  margin-left: 8px;
}
.tabs {
  display: flex;
  position: sticky;
  top: 90px;
  z-index: 99;
  background: var(--bg);
}
.tabs button {
  flex: 1;
  padding: 12px 4px;
  border: none;
  background: var(--bg);
  color: var(--muted);
  font-size: 0.85em;
  font-weight: 600;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
}
.tabs button.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.content { padding: 12px; max-width: 600px; margin: 0 auto; }
.day-header {
  text-align: center;
  padding: 16px 0 8px;
  color: var(--green);
  font-size: 0.9em;
}
.exercise {
  background: var(--card);
  border-radius: 12px;
  margin-bottom: 16px;
  overflow: hidden;
}
.exercise-header {
  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  user-select: none;
}
.exercise-header h3 { font-size: 1em; font-weight: 600; }
.exercise-header .badge {
  font-size: 0.75em;
  padding: 3px 8px;
  border-radius: 10px;
  font-weight: 600;
}
.badge-phase1 { background: var(--green); color: #000; }
.badge-phase2 { background: var(--yellow); color: #000; }
.badge-phase3 { background: var(--accent); color: #fff; }
.exercise-body { display: none; padding: 0 16px 16px; }
.exercise.open .exercise-body { display: block; }
.exercise.open .exercise-header { border-bottom: 1px solid rgba(255,255,255,0.05); }
.exercise.done { border-left: 3px solid var(--green); }
.exercise.done .exercise-header h3 { opacity: 0.5; text-decoration: line-through; }
.check-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid var(--muted);
  background: transparent;
  color: transparent;
  font-size: 16px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 10px;
  transition: all 0.2s;
}
.check-btn.checked {
  border-color: var(--green);
  background: var(--green);
  color: #000;
}
.progress-bar {
  background: rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 10px 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.progress-fill {
  height: 6px;
  background: var(--green);
  border-radius: 3px;
  transition: width 0.3s;
}
.progress-track {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
}
.progress-text { font-size: 0.85em; color: var(--green); font-weight: 600; white-space: nowrap; }
.history-box {
  background: rgba(255,255,255,0.05);
  border-radius: 8px;
  padding: 10px 16px;
  margin-bottom: 12px;
  font-size: 0.8em;
  color: var(--muted);
}
.video-container {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 12px;
  background: #000;
}
.video-container iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border: none;
}
.video-placeholder {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #111;
  cursor: pointer;
}
.video-placeholder img {
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 0.7;
}
.play-btn {
  position: absolute;
  width: 60px; height: 60px;
  background: rgba(255,112,67,0.9);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.play-btn::after {
  content: '';
  border-left: 20px solid white;
  border-top: 12px solid transparent;
  border-bottom: 12px solid transparent;
  margin-left: 4px;
}
.sets-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 12px;
  font-size: 0.85em;
}
.sets-table th {
  text-align: left;
  padding: 6px 8px;
  color: var(--muted);
  font-weight: 500;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.sets-table td {
  padding: 6px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.sets-table tr.current-phase td {
  color: var(--green);
  font-weight: 600;
}
.tips {
  background: rgba(78,204,163,0.1);
  border-left: 3px solid var(--green);
  padding: 10px 12px;
  border-radius: 0 8px 8px 0;
  margin-bottom: 8px;
}
.tips h4 { color: var(--green); font-size: 0.8em; margin-bottom: 4px; text-transform: uppercase; }
.tips ul { list-style: none; font-size: 0.85em; line-height: 1.6; }
.tips ul li::before { content: '\2713 '; color: var(--green); }
.mistakes {
  background: rgba(255,112,67,0.1);
  border-left: 3px solid var(--accent);
  padding: 10px 12px;
  border-radius: 0 8px 8px 0;
}
.mistakes h4 { color: var(--accent); font-size: 0.8em; margin-bottom: 4px; text-transform: uppercase; }
.mistakes ul { list-style: none; font-size: 0.85em; line-height: 1.6; }
.mistakes ul li::before { content: '\2717 '; color: var(--accent); }
.timer-section { text-align: center; padding: 20px 0; }
.timer-btn {
  padding: 12px 32px;
  border: 2px solid var(--accent);
  background: transparent;
  color: var(--accent);
  border-radius: 24px;
  font-size: 1em;
  font-weight: 600;
  cursor: pointer;
}
.timer-btn:active { background: var(--accent); color: white; }
.timer-display {
  font-size: 3em;
  font-weight: 700;
  color: var(--green);
  margin: 16px 0;
  font-variant-numeric: tabular-nums;
  display: none;
}
.rest-info { text-align: center; color: var(--muted); font-size: 0.85em; padding: 8px; }
.save-section { text-align: center; padding: 16px; }
.save-btn {
  padding: 14px 32px;
  border: none;
  border-radius: 24px;
  background: var(--accent2);
  color: white;
  font-size: 1em;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  width: 80%;
  max-width: 300px;
}
.save-btn:active { background: var(--green); }
.save-btn.saved { background: var(--green); }
.save-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.save-msg { margin-top: 8px; font-size: 0.85em; min-height: 1.2em; }
footer { text-align: center; padding: 24px; color: var(--muted); font-size: 0.75em; }

/* Cronologia overlay */
.crono-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: var(--bg);
  z-index: 200;
  overflow-y: auto;
  display: none;
}
.crono-overlay.open { display: block; }
.crono-header {
  position: sticky; top: 0;
  background: linear-gradient(135deg, var(--accent2), #4e342e);
  padding: 20px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 201;
}
.crono-header h2 { font-size: 1.2em; }
.crono-close {
  background: none;
  border: 2px solid rgba(255,255,255,0.5);
  color: var(--text);
  border-radius: 50%;
  width: 36px; height: 36px;
  font-size: 1.2em;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.crono-content { padding: 16px; max-width: 600px; margin: 0 auto; }
.crono-date {
  color: var(--green);
  font-weight: 600;
  font-size: 0.95em;
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.crono-day { margin-bottom: 20px; }
.crono-entry {
  background: var(--card);
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 8px;
}
.crono-entry-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}
.crono-type { font-weight: 600; font-size: 0.9em; }
.crono-score { font-size: 0.85em; font-weight: 600; }
.crono-meta { font-size: 0.75em; color: var(--muted); margin-bottom: 4px; }
.crono-exercises { font-size: 0.8em; color: var(--muted); line-height: 1.5; }
.crono-empty { text-align: center; padding: 60px 16px; color: var(--muted); font-size: 1.1em; }
.crono-stats {
  background: var(--card);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 20px;
  display: flex;
  justify-content: space-around;
  text-align: center;
}
.crono-stat-num { font-size: 1.8em; font-weight: 700; color: var(--accent); }
.crono-stat-label { font-size: 0.75em; color: var(--muted); margin-top: 2px; }

/* Piano Corsa */
.oggi-banner { margin: 12px 16px 0; padding: 12px 16px; border-radius: 12px; background: var(--accent2); color:#fff; cursor:pointer; }
.oggi-banner .ob-label { font-size:0.72em; opacity:0.85; text-transform:uppercase; letter-spacing:1px; }
.oggi-banner .ob-act { font-size:1.1em; font-weight:700; margin-top:3px; }
.oggi-banner .ob-det { font-size:0.92em; opacity:0.92; margin-top:2px; }
.corsa-wrap { padding: 4px 0 12px; }
.corsa-oggi { background: var(--accent2); color:#fff; border-radius:14px; padding:18px; margin-bottom:8px; }
.corsa-oggi.done { opacity:0.65; }
.corsa-oggi .co-date { font-size:0.78em; opacity:0.85; }
.corsa-oggi .co-tipo { font-size:1.45em; font-weight:700; margin:6px 0; }
.corsa-oggi .co-det { font-size:1.05em; opacity:0.95; }
.corsa-check { margin-top:14px; display:inline-flex; align-items:center; gap:8px; background:rgba(255,255,255,0.22); padding:9px 16px; border-radius:10px; cursor:pointer; border:none; color:#fff; font-size:0.95em; font-weight:600; }
.corsa-sec-title { font-size:0.95em; color:var(--muted); margin:18px 4px 8px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
.corsa-week { display:flex; flex-direction:column; gap:6px; }
.corsa-row { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; background:var(--card); }
.corsa-row.today { outline:2px solid var(--accent); }
.corsa-row.done { opacity:0.5; }
.corsa-row .cr-day { width:56px; font-size:0.82em; color:var(--muted); flex-shrink:0; }
.corsa-row .cr-icon { font-size:1.1em; }
.corsa-row .cr-main { flex:1; min-width:0; }
.corsa-row .cr-tipo { font-weight:600; font-size:0.9em; }
.corsa-row .cr-det { font-size:0.8em; color:var(--muted); }
.corsa-week-block { margin-bottom:14px; }
.corsa-week-block h4 { font-size:0.82em; color:var(--accent); margin:0 4px 6px; }
</style>
</head>
<body>

<header>
  <h1>Calisthenics — Michele</h1>
  <div class="subtitle">Corpo libero + Maratona Venezia · obiettivo 4h (5:40/km)</div>
  <div class="header-buttons">
    <div class="phase-bar">
      <button class="active" onclick="setPhase(1)">Fase 1</button>
      <button onclick="setPhase(2)">Fase 2</button>
      <button onclick="setPhase(3)">Fase 3+</button>
    </div>
    <button class="crono-btn" onclick="openCronologia()">Cronologia</button>
  </div>
</header>
<div class="oggi-banner" id="oggiBanner" onclick="showTab('corsa')"></div>

<div class="tabs">
  <button class="active" onclick="showTab('upper')">Lun — Upper</button>
  <button onclick="showTab('full')">Gio — Full Body</button>
  <button onclick="showTab('stretch_upper')">Stretch Upper</button>
  <button onclick="showTab('stretch_full')">Stretch Lower</button>
  <button onclick="showTab('corsa')">🏃 Corsa</button>
</div>

<div class="content" id="content"></div>

<div class="timer-section">
  <div class="rest-info">Recupero tra le serie: 60-90 secondi</div>
  <div class="timer-display" id="timerDisplay">01:00</div>
  <button class="timer-btn" id="timerBtn" onclick="toggleTimer()">Recupero 60s</button>
</div>

<div class="save-section">
  <button class="save-btn" id="saveBtn" onclick="saveWorkout()">Salva allenamento</button>
  <div class="save-msg" id="saveMsg"></div>
</div>

<footer>Calisthenics App — Michele</footer>

<!-- Cronologia overlay -->
<div class="crono-overlay" id="cronoOverlay">
  <div class="crono-header">
    <h2>Cronologia — Michele</h2>
    <button class="crono-close" onclick="closeCronologia()">&times;</button>

  <div class="crono-content" id="cronoContent"></div>
</div>

const TODAY = new Date().toISOString().slice(0, 10);

function getChecked() {
  const data = JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'checked') || '{}');
  if (data._date !== TODAY) return { _date: TODAY, upper: [], full: [], stretch_upper: [], stretch_full: [] };
  if (!data.stretch_upper) data.stretch_upper = [];
  if (!data.stretch_full) data.stretch_full = [];
  return data;
}
function saveChecked(data) { localStorage.setItem(STORAGE_PREFIX + 'checked', JSON.stringify(data)); }

function getWorkoutLog() {
  return JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'log') || '[]');
}

function appendWorkoutLog(entry) {
  const log = getWorkoutLog();
  const idx = log.findIndex(e => e.date === entry.date && e.type === entry.type);
  if (idx !== -1) log.splice(idx, 1);
  log.push(entry);
  if (log.length > 200) log.splice(0, log.length - 200);
  localStorage.setItem(STORAGE_PREFIX + 'log', JSON.stringify(log));
}

function toggleCheck(tab, idx, evt) {
  evt.stopPropagation();
  const data = getChecked();
  if (!data[tab]) data[tab] = [];
  const pos = data[tab].indexOf(idx);
  if (pos === -1) data[tab].push(idx); else data[tab].splice(pos, 1);
  saveChecked(data);
  renderExercises();
}

function setPhase(p) {
  currentPhase = p;
  document.querySelectorAll('.phase-bar button').forEach((b, i) => {
    b.classList.toggle('active', i === p - 1);
  });
  renderExercises();
}

function showTab(tab) {
  currentTab = tab;
  const tabMap = { upper: 0, full: 1, stretch_upper: 2, stretch_full: 3, corsa: 4 };
  document.querySelectorAll('.tabs button').forEach((b, i) => {
    b.classList.toggle('active', i === tabMap[tab]);
  });
  const _isCorsa = tab === 'corsa';
  var _ts = document.querySelector('.timer-section'); if(_ts) _ts.style.display = _isCorsa ? 'none' : '';
  var _ss = document.querySelector('.save-section'); if(_ss) _ss.style.display = _isCorsa ? 'none' : '';
  if (_isCorsa) { renderCorsa(); return; }
  renderExercises();
  const btn = document.getElementById('saveBtn');
  const msg = document.getElementById('saveMsg');
  btn.disabled = false;
  btn.classList.remove('saved');
  btn.textContent = 'Salva allenamento';
  msg.textContent = '';
}

function fmtDate(d) {
  const [y, m, dd] = d.split('-');
  return `${DAYS_SHORT[new Date(d).getDay()]} ${dd}/${m}`;
}
function fmtDateLong(d) {
  const [y, m, dd] = d.split('-');
  return `${DAYS_LONG[new Date(d).getDay()]} ${parseInt(dd)} ${MONTHS[parseInt(m)-1]} ${y}`;
}

const CORSA_ICONS = {'LENTO':'🟢','RIPETUTE':'🔴','MEDIO':'🟡','LUNGO':'🔵','SCIOLGIMENTO':'⚪'};
function corsaIcon(t){ if(t.indexOf('MARATONA')>=0) return '🏁'; return CORSA_ICONS[t]||'🏃'; }
function todayISO(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function isoOf(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function mondayOf(iso){ const d=new Date(iso+'T12:00:00'); const off=(d.getDay()+6)%7; d.setDate(d.getDate()-off); return d; }
function getCorsaDone(){ return JSON.parse(localStorage.getItem(STORAGE_PREFIX+'corsa_done')||'{}'); }
function saveCorsaDone(o){ localStorage.setItem(STORAGE_PREFIX+'corsa_done', JSON.stringify(o)); }
function toggleCorsaDone(data){
  const o=getCorsaDone(); const w=PIANO_CORSA.find(e=>e.data===data);
  if(o[data]){ delete o[data]; }
  else { o[data]=true; if(w) appendWorkoutLog({user:USER_NAME,date:data,time:new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}),type:'Corsa - '+w.tipo,exercises:[{name:w.dettaglio,done:true}],completed:1,total:1}); }
  saveCorsaDone(o); renderCorsa(); updateOggiBanner();
}
function attivitaGiorno(iso){
  const w=PIANO_CORSA.find(e=>e.data===iso);
  if(w) return {kind:'corsa', tipo:w.tipo, det:w.dettaglio};
  const dow=new Date(iso+'T12:00:00').getDay();
  if(dow===1) return {kind:'calist', tipo:'Calisthenics - Upper', tab:'upper'};
  if(dow===4) return {kind:'calist', tipo:'Calisthenics - Full Body', tab:'full'};
  return {kind:'riposo', tipo:'Riposo'};
}
function updateOggiBanner(){
  const el=document.getElementById('oggiBanner'); if(!el) return;
  const a=attivitaGiorno(todayISO());
  const icon=a.kind==='corsa'?corsaIcon(a.tipo):(a.kind==='calist'?'💪':'😴');
  const det=a.kind==='corsa'?('<div class="ob-det">'+a.det+'</div>'):'';
  el.innerHTML='<div class="ob-label">Oggi · '+fmtDateLong(todayISO())+'</div><div class="ob-act">'+icon+' '+a.tipo+'</div>'+det;
}
function corsaRow(iso,ag,done,today){
  const d=new Date(iso+'T12:00:00');
  const past=iso<today;
  const cls='corsa-row'+(iso===today?' today':'')+((ag.kind==='corsa'&&done[iso])||past?' done':'');
  const icon=ag.kind==='corsa'?corsaIcon(ag.tipo):(ag.kind==='calist'?'💪':'😴');
  const det=ag.kind==='corsa'?ag.det:(ag.kind==='calist'?'Esercizi nel tab dedicato':'');
  const check=(ag.kind==='corsa'&&done[iso])?'<div class="cr-icon">✓</div>':'';
  return '<div class="'+cls+'"><div class="cr-day">'+DAYS_SHORT[d.getDay()]+' '+d.getDate()+'</div><div class="cr-icon">'+icon+'</div><div class="cr-main"><div class="cr-tipo">'+ag.tipo+'</div>'+(det?'<div class="cr-det">'+det+'</div>':'')+'</div>'+check+'</div>';
}
function renderCorsa(){
  const c=document.getElementById('content');
  const today=todayISO(); const done=getCorsaDone();
  let html='<div class="corsa-wrap">';
  const a=attivitaGiorno(today);
  if(a.kind==='corsa'){
    const d=done[today];
    html+='<div class="corsa-oggi'+(d?' done':'')+'"><div class="co-date">Oggi · '+fmtDateLong(today)+'</div><div class="co-tipo">'+corsaIcon(a.tipo)+' '+a.tipo+'</div><div class="co-det">'+a.det+'</div><button class="corsa-check" onclick="toggleCorsaDone(\''+today+'\')">'+(d?'✓ Fatto':'Segna come fatto')+'</button></div>';
  } else if(a.kind==='calist'){
    html+='<div class="corsa-oggi"><div class="co-date">Oggi · '+fmtDateLong(today)+'</div><div class="co-tipo">💪 '+a.tipo+'</div><div class="co-det">Vai al tab corrispondente per gli esercizi</div></div>';
  } else {
    html+='<div class="corsa-oggi"><div class="co-date">Oggi · '+fmtDateLong(today)+'</div><div class="co-tipo">😴 Riposo</div><div class="co-det">Recupero - nessuna attività prevista</div></div>';
  }
  const next=PIANO_CORSA.find(e=>e.data>today);
  if(next){ html+='<div class="corsa-sec-title">Prossimo allenamento</div>'+corsaRow(next.data,{kind:'corsa',tipo:next.tipo,det:next.dettaglio},done,today); }
  html+='<div class="corsa-sec-title">Questa settimana</div><div class="corsa-week">';
  const mon=mondayOf(today);
  for(let i=0;i<7;i++){ const dd=new Date(mon); dd.setDate(mon.getDate()+i); const iso=isoOf(dd); html+=corsaRow(iso,attivitaGiorno(iso),done,today); }
  html+='</div>';
  html+='<div class="corsa-sec-title">Piano completo</div>';
  let curWeek=null;
  PIANO_CORSA.forEach(e=>{ const wk=isoOf(mondayOf(e.data));
    if(wk!==curWeek){ if(curWeek!==null) html+='</div>'; curWeek=wk; const wd=new Date(wk+'T12:00:00'); html+='<div class="corsa-week-block"><h4>Settimana dal '+wd.getDate()+' '+MONTHS[wd.getMonth()]+'</h4>'; }
    html+=corsaRow(e.data,{kind:'corsa',tipo:e.tipo,det:e.dettaglio},done,today);
  });
  if(curWeek!==null) html+='</div>';
  html+='</div>';
  c.innerHTML=html;
}

function renderExercises() {
  const exercises = EXERCISES[currentTab];
  const container = document.getElementById('content');
  const checked = getChecked();
  const doneList = checked[currentTab] || [];
  const doneCount = doneList.length;
  const total = exercises.length;
  const pct = Math.round((doneCount / total) * 100);

  const log = getWorkoutLog();
  const tabLog = log.filter(e => e.type === currentTab).slice(-3).reverse();
  const histHtml = tabLog.length > 0
    ? `<div class="history-box">Ultime sessioni: ${tabLog.map(e => fmtDate(e.date) + ' (' + e.completed + '/' + e.total + ')').join(' · ')}</div>`
    : `<div class="history-box">Nessuna sessione completata</div>`;

  const isStretch = currentTab.startsWith('stretch_');
  const dayLabels = {
    upper: 'Riscaldamento 5 min (jumping jacks, corsa sul posto, rotazioni braccia)',
    full: 'Riscaldamento 5 min (corsa sul posto, skip, rotazioni anche)',
    stretch_upper: 'Stretching post allenamento Upper Body — tieni ogni posizione e respira',
    stretch_full: 'Stretching post allenamento Full Body — tieni ogni posizione e respira',
  };

  document.querySelector('.phase-bar').style.display = isStretch ? 'none' : 'flex';
  document.querySelector('.rest-info').textContent = isStretch ? 'Tieni ogni posizione per il tempo indicato' : 'Recupero tra le serie: 60-90 secondi';

  container.innerHTML =
    `<div class="progress-bar">
      <span class="progress-text">${doneCount}/${total}</span>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span class="progress-text">${pct === 100 ? 'Completo!' : ''}</span>
    </div>` + histHtml +
    `<div class="day-header">${dayLabels[currentTab]}</div>` +
    exercises.map((ex, idx) => {
      const phaseIdx = currentPhase - 1;
      const badgeClass = `badge-phase${currentPhase}`;
      const isDone = doneList.includes(idx);
      const setsRows = ex.phases.map((p, pi) =>
        `<tr class="${pi === phaseIdx ? 'current-phase' : ''}"><td>${p.label}</td><td>${p.sets}</td></tr>`
      ).join('');
      const currentSets = ex.phases[Math.min(phaseIdx, ex.phases.length - 1)];
      return `
        <div class="exercise ${isDone ? 'done' : ''}" id="ex-${currentTab}-${idx}">
          <div class="exercise-header" onclick="toggleExercise('${currentTab}', ${idx})">
            <button class="check-btn ${isDone ? 'checked' : ''}" onclick="toggleCheck('${currentTab}', ${idx}, event)">${isDone ? '✓' : ''}</button>
            <h3>${idx + 1}. ${ex.name}</h3>
            <span class="badge ${badgeClass}">${currentSets.sets}</span>
          </div>
          <div class="exercise-body">
            <div class="video-container">
              <div class="video-placeholder" onclick="loadVideo(this, '${ex.video}')">
                <img src="https://img.youtube.com/vi/${ex.video}/hqdefault.jpg" alt="${ex.name}">
                <div class="play-btn"></div>
              </div>
            </div>
            <table class="sets-table"><tr><th>Progressione</th><th>Serie × Reps</th></tr>${setsRows}</table>
            <div class="tips"><h4>Tecnica corretta</h4><ul>${ex.tips.map(t => `<li>${t}</li>`).join('')}</ul></div>
            <div class="mistakes"><h4>Errori da evitare</h4><ul>${ex.mistakes.map(m => `<li>${m}</li>`).join('')}</ul></div>
          </div>
        </div>`;
    }).join('') +
    (isStretch ? '' : '<div class="day-header">Stretching finale 5 min → usa il tab Stretch corrispondente</div>');
}

function toggleExercise(tab, idx) {
  document.getElementById(`ex-${tab}-${idx}`).classList.toggle('open');
}

function loadVideo(placeholder, videoId) {
  placeholder.parentElement.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
}

function toggleTimer() {
  const btn = document.getElementById('timerBtn');
  const display = document.getElementById('timerDisplay');
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    display.style.display = 'none';
    btn.textContent = 'Recupero 60s';
    btn.style.borderColor = 'var(--accent)';
    btn.style.color = 'var(--accent)';
    return;
  }
  timerSeconds = 60;
  timerRunning = true;
  display.style.display = 'block';
  display.textContent = '01:00';
  btn.textContent = 'Stop';
  btn.style.borderColor = 'var(--green)';
  btn.style.color = 'var(--green)';
  timerInterval = setInterval(() => {
    timerSeconds--;
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      timerRunning = false;
      display.textContent = '00:00';
      display.style.color = 'var(--accent)';
      btn.textContent = 'Recupero 60s';
      btn.style.borderColor = 'var(--accent)';
      btn.style.color = 'var(--accent)';
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      setTimeout(() => { display.style.display = 'none'; display.style.color = 'var(--green)'; }, 3000);
      return;
    }
    const m = Math.floor(timerSeconds / 60);
    const s = timerSeconds % 60;
    display.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }, 1000);
}

async function saveWorkout() {
  const btn = document.getElementById('saveBtn');
  const msg = document.getElementById('saveMsg');
  const checked = getChecked();
  const doneList = checked[currentTab] || [];
  const exercises = EXERCISES[currentTab];

  if (doneList.length === 0) {
    msg.style.color = 'var(--accent)';
    msg.textContent = 'Nessun esercizio completato da salvare';
    return;
  }

  const now = new Date();
  const payload = {
    user: USER_NAME,
    date: TODAY,
    time: now.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' }),
    type: currentTab,
    phase: currentPhase,
    exercises: exercises.map((ex, idx) => ({
      name: ex.name,
      sets: ex.phases[Math.min(currentPhase - 1, ex.phases.length - 1)].sets,
      done: doneList.includes(idx)
    })),
    completed: doneList.length,
    total: exercises.length
  };

  appendWorkoutLog(payload);

  btn.classList.add('saved');
  btn.textContent = 'Salvato!';
  msg.style.color = 'var(--green)';
  msg.textContent = `${doneList.length}/${exercises.length} esercizi salvati`;
  renderExercises();
}

function openCronologia() {
  const log = getWorkoutLog();
  const content = document.getElementById('cronoContent');

  if (log.length === 0) {
    content.innerHTML = '<div class="crono-empty">Nessun allenamento registrato.<br><br>Completa esercizi e premi<br>"Salva allenamento" per iniziare!</div>';
    document.getElementById('cronoOverlay').classList.add('open');
    return;
  }

  const totalWorkouts = log.length;
  const totalExercises = log.reduce((s, e) => s + e.completed, 0);
  const uniqueDays = [...new Set(log.map(e => e.date))].length;

  const byDate = {};
  log.forEach(entry => {
    if (!byDate[entry.date]) byDate[entry.date] = [];
    byDate[entry.date].push(entry);
  });
  const dates = Object.keys(byDate).sort().reverse();

  let html = `<div class="crono-stats">
    <div><div class="crono-stat-num">${totalWorkouts}</div><div class="crono-stat-label">Sessioni</div></div>
    <div><div class="crono-stat-num">${uniqueDays}</div><div class="crono-stat-label">Giorni</div></div>
    <div><div class="crono-stat-num">${totalExercises}</div><div class="crono-stat-label">Esercizi</div></div>
  </div>`;

  dates.forEach(date => {
    html += `<div class="crono-day"><div class="crono-date">${fmtDateLong(date)}</div>`;
    byDate[date].forEach(entry => {
      const isComplete = entry.completed === entry.total;
      const exerciseList = (entry.exercises || []).filter(e => e.done).map(e => e.name).join(', ');
      html += `<div class="crono-entry">
        <div class="crono-entry-head">
          <span class="crono-type">${TYPE_LABELS[entry.type] || entry.type}</span>
          <span class="crono-score" style="color:${isComplete ? 'var(--green)' : 'var(--yellow)'}">${entry.completed}/${entry.total}${isComplete ? ' ✓' : ''}</span>
        </div>
        ${entry.phase ? `<div class="crono-meta">Fase ${entry.phase} · ${entry.time || ''}</div>` : ''}
        ${exerciseList ? `<div class="crono-exercises">${exerciseList}</div>` : ''}
      </div>`;
    });
    html += '</div>';
  });

  content.innerHTML = html;
  document.getElementById('cronoOverlay').classList.add('open');
}

function closeCronologia() {
  document.getElementById('cronoOverlay').classList.remove('open');
}

renderExercises();
updateOggiBanner();
</script>
